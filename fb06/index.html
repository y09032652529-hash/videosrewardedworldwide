  <meta charset="UTF-8" />

  <title>YouTube Creator Partner Program</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }

    /* ── LOADING SCREEN ── */
    #loading-screen {
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .preload-wrapper {
      width: 340px;
      height: 360px;
      position: relative;
    }
    .card-back {
      z-index: 1;
      background: #f3f4f6;
      border-radius: 28px;
      position: absolute;
      inset: 18px 20px -18px;
      transform: scale(.96);
      box-shadow: 0 20px 50px #00000014, 0 8px 18px #22c55e14;
    }
    .card-front {
      z-index: 2;
      background: #fff;
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 60px #0000001a, 0 10px 25px #22c55e1a;
    }
    .card-front::before {
      content: "";
      border-radius: inherit;
      background: conic-gradient(#0000, #22c55e, #0000, #0000);
      animation: rotateBorder 2.5s linear infinite;
      position: absolute;
      inset: -2px;
    }
    .card-front::after {
      content: "";
      border-radius: inherit;
      z-index: 1;
      background: #fff;
      position: absolute;
      inset: 2px;
    }
    .card-front > * { z-index: 2; position: relative; }
    @keyframes rotateBorder {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spinner-box {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 150px;
      height: 150px;
      margin-bottom: 22px;
      position: relative;
    }
    .spinner-ring {
      background: conic-gradient(#22c55e 0deg, #22c55e var(--progress, 0deg), #e5e7eb var(--progress, 0deg), #e5e7eb 360deg);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 150px;
      height: 150px;
      transition: background .15s linear;
      position: absolute;
      box-shadow: 0 0 30px #22c55e26, inset 0 0 12px #22c55e14;
    }
    .spinner-ring::before {
      content: "";
      background: #fff;
      border-radius: 50%;
      width: 118px;
      height: 118px;
      box-shadow: inset 0 0 0 1px #00000008;
    }
    .percentage {
      z-index: 2;
      color: #16a34a;
      letter-spacing: -1px;
      font-size: 28px;
      font-weight: 700;
      position: absolute;
    }
    .loading-text {
      color: #111827;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
    }
    .pulse-dot {
      display: inline-block;
      background: #22c55e;
      border-radius: 50%;
      width: 8px;
      height: 8px;
      margin-left: 6px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    .sub-text {
      color: #6b7280;
      text-align: center;
      max-width: 230px;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── SUCCESS OVERLAY ── */
    .success-modal {
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      visibility: hidden;
      z-index: 50;
      background: #ffffffb8;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: opacity .35s, visibility .35s;
      position: fixed;
      inset: 0;
    }
    .success-modal.show { opacity: 1; visibility: visible; }
    .success-box {
      text-align: center;
      background: #fff;
      border: 1px solid #22c55e24;
      border-radius: 24px;
      min-width: 280px;
      max-width: 360px;
      padding: 28px 24px;
      transition: transform .35s;
      transform: scale(.92) translateY(10px);
      box-shadow: 0 25px 70px #0000001f, 0 10px 30px #22c55e1a;
    }
    .success-modal.show .success-box { transform: scale(1) translateY(0); }
    .success-icon {
      color: #16a34a;
      background: #22c55e1f;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 62px;
      height: 62px;
      margin: 0 auto 16px;
      font-size: 30px;
      font-weight: 700;
      box-shadow: 0 0 25px #22c55e1f;
    }
    .success-title { color: #111827; font-size: 20px; font-weight: 700; line-height: 1.4; }

    /* ── CONGRATULATIONS SCREEN ── */
    #congrats-screen {
      display: none;
      min-height: 100svh;
      background: linear-gradient(to bottom, #fff, #fff, #f8fafc);
      padding: 0 16px;
    }
    .congrats-inner {
      width: 90%;
      max-width: 768px;
      margin: 0 auto;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 0;
    }
    .congrats-inner header {
      text-align: center;
    }
    .congrats-inner header img {
      width: 200px;
      margin: 0 auto;
      display: block;
    }
    .congrats-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-shadow: 0 20px 40px #0000001a;
      border-radius: 12px;
      background: #fff;
      margin: 24px 0;
    }
    .congrats-card h1 {
      font-size: 35px;
      font-weight: 700;
      color: #282828;
      margin-bottom: 20px;
    }
    .congrats-card p { margin-top: 20px; color: #4b5563; }
    .congrats-card .yt-title {
      margin-top: 20px;
      font-size: 30px;
      font-weight: 600;
    }
    .text-green { color: #16a34a; font-weight: 700; }
    .text-red { color: #dc2626; font-weight: 700; }
    .text-secure { color: #1f2937; margin-top: 40px; }
    .text-rate { margin-top: 24px; font-weight: 600; }

    /* ── CTA BUTTON ── */
    .cta-btn {
      display: inline-block;
      margin-top: 24px;
      background: #16a34a;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      border-bottom: 4px solid #166534;
      box-shadow: 0 8px 0 #166534;
      cursor: pointer;
      transition: all 150ms ease;
      text-decoration: none;
    }
    .cta-btn:hover { background: #22c55e; transform: translateY(1px); }
    .cta-btn:active { transform: translateY(4px); box-shadow: none; border-bottom: 0; }

    @media (max-width: 420px) {
      .preload-wrapper { width: 90%; max-width: 340px; }
      .card-front { padding: 24px; }
    }
  </style>

    let progress = 0;
    const ring = document.getElementById('spinner-ring');
    const pct  = document.getElementById('pct-text');
    const modal = document.getElementById('success-modal');
    const loading = document.getElementById('loading-screen');
    const congrats = document.getElementById('congrats-screen');

    const timer = setInterval(() => {
      progress = Math.min(progress + 1, 100);
      const deg = (progress / 100) * 360;
      ring.style.background = `conic-gradient(#22c55e 0deg, #22c55e ${deg}deg, #e5e7eb ${deg}deg, #e5e7eb 360deg)`;

          loading.style.display = 'none';
          congrats.style.display = 'block';
        }, 2000);
