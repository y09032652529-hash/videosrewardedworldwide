<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="check-circle">✅</div>
    <div>
      <div class="earned-box">
        <div class="earned-amount" id="earned-display">+ US$ 0</div>
        <div class="earned-label">Has been added to your balance!</div>
      </div>
    </div>
    <div class="modal-sub">Keep evaluating to earn more! 🚀</div>
  </div>
</div>

<script>
var earned = 71;
var balanceStart = 71.0;
var nextPage = "../pag3/index.html";

function handleVote(relevant) {
  // Show modal with earned amount
  document.getElementById('earned-display').textContent = '+ US$ ' + earned;
  document.getElementById('modal').classList.add('show');
  
  // Animate balance counter
  var start = balanceStart;
  var end = balanceStart + earned;
  var duration = 1500;
  var startTime = null;
  function animate(ts) {
    if (!startTime) startTime = ts;
    var progress = Math.min((ts - startTime) / duration, 1);
    var current = start + (end - start) * progress;
    document.getElementById('balance').textContent = 'US$ ' + current.toFixed(2);
    if (progress < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
  
  // Navigate after 2.5 seconds
  setTimeout(function() {
    window.location.href = nextPage + window.location.search;
  }, 2500);
}
</script>
