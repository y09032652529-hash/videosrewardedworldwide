<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }
  
  header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
  header img.logo { height: 40px; width: auto; }
  
  .wallet { display: flex; align-items: center; gap: 10px; border: 2px dashed #4ade80; border-radius: 10px; padding: 10px 14px; background: #fff; animation: glow 2s ease-in-out infinite; position: relative; overflow: hidden; }
  .wallet::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, transparent, rgba(134,239,172,0.4), transparent); animation: shimmer 2.5s linear infinite; }
  .wallet svg { color: #16a34a; flex-shrink: 0; }
  .balance { font-size: 22px; font-weight: 700; color: #16a34a; line-height: 1; }
  
  @keyframes glow { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); } 50% { box-shadow: 0 0 16px 4px rgba(34,197,94,.35); } }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  
  .video-wrap { width: 100%; position: relative; padding-top: 56.25%; background: #000; }
  .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  
  .info { padding: 14px 16px 10px; }
  .info h1 { font-size: 17px; color: #4B5761; margin-bottom: 4px; }

  .channel { display: flex; align-items: center; gap: 10px; }
  .channel img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
  .channel span { color: #4B5761; font-size: 15px; }
  .verified { display: flex; align-items: center; gap: 6px; background: #1f2937; color: #fff; padding: 4px 10px; border-radius: 999px; font-size: 12px; }
  .verified-dot { width: 18px; height: 18px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  
  .question-card { margin: 14px 16px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
  .question-card h3 { text-align: center; color: #878787; font-size: 16px; margin-bottom: 8px; }
  .question-card p { text-align: center; color: #333; margin-bottom: 14px; animation: pulse-size 1s ease-in-out infinite; font-size: 15px; }
  @keyframes pulse-size { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
  
  .btn-row { display: flex; gap: 10px; }
  .btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,.1); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; animation: pulse-size 1s ease-in-out infinite; }
  .btn:active { opacity: .8; }
  .btn-no { background: rgba(250,8,21,1); color: #e9e9e9; }
  .btn-yes { background: green; color: #e9e9e9; }
  
  .img-card { width: 100%; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 14px; }
  .img-card img { width: 100%; height: auto; display: block; }
  .imgs { padding: 0 16px 32px; }
  
  /* Overlay modal */
  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,.4); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: #f9fafb; border-radius: 24px; padding: 40px 32px; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
  .check-circle { width: 88px; height: 88px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 44px; }
  .earned-amount { font-size: 36px; font-weight: 700; color: #16a34a; }
  .earned-box { border: 1px solid #bbf7d0; background: #f0fdf4; border-radius: 10px; padding: 14px 20px; width: 100%; }
  .earned-label { font-size: 12px; color: #15803d; margin-top: 4px; }
  .modal-sub { font-size: 13px; color: #6b7280; }

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="check-circle">✅</div>
    <div>
      <div class="earned-box">
        <div class="earned-amount" id="earned-display">+ US$ 0</div>
        <div class="earned-label">Has been added to your balance!</div>
      </div>
    </div>
    <div class="modal-sub">Keep evaluating to earn more! 🚀</div>
  </div>
</div>

<script>
var earned = 71;
var balanceStart = 0.0;
var nextPage = "../pag2/index.html";

function handleVote(relevant) {
  // Show modal with earned amount
  document.getElementById('earned-display').textContent = '+ US$ ' + earned;
  document.getElementById('modal').classList.add('show');
  
  // Animate balance counter
  var start = balanceStart;
  var end = balanceStart + earned;
  var duration = 1500;
  var startTime = null;
  function animate(ts) {
    if (!startTime) startTime = ts;
    var progress = Math.min((ts - startTime) / duration, 1);
    var current = start + (end - start) * progress;
    document.getElementById('balance').textContent = 'US$ ' + current.toFixed(2);
    if (progress < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
  
  // Navigate after 2.5 seconds
  setTimeout(function() {
    window.location.href = nextPage + window.location.search;
  }, 2500);
}
</script>
