<script>
window.UPSELL_LANG = 'en';

// ===== TRANSLATIONS UP1 =====
var T = {
    alertTitle: "⚠️ Attention! Your access to the application is not yet 100% complete...",
    mainText1: "The app was recently updated to <span class='font-bold'>version 2.0</span> — and all that's missing is your final activation.",
    mainText2: "<span class='font-bold'>Activate now</span> and start earning up to <span class='font-bold'>3× more</span>. 🚀",
    instruction: "Click the button below to start the activation process.",
    activateBtnText: "ACTIVATE APP 2.0",
    activatingText: "ACTIVATION IN PROGRESS...",
    progressClickText: "Click to start",
    progressRunning: "Updating to version 2.0...",
    progressDone: "Activation complete!",
    activatedText: "APP ACTIVATED",
    completionTitle: "✓ Activation complete!",
    completionText: "Your application has been updated and is ready to use.",
    confirmText: "Click the button below to confirm your activation."
  };

// ===== UTM PASS-THROUGH =====
function applyUTMToCheckout() {
  var params = new URLSearchParams(window.location.search);
  if (!params.toString()) return;
  document.querySelectorAll('a.btn-sim').forEach(function(link) {
    try {
      var url = new URL(link.href);
      params.forEach(function(value, key) { url.searchParams.set(key, value); });
      link.href = url.toString();
    } catch(e) {}
  });
}

// ===== MAIN CLASS =====
class UpSellPage1 {
  constructor() {
    
    this.t = T;
    this.isProgressStarted = false;
    this.isAnimationComplete = false;
    this.progressValue = 0;

    this.activateBtn = document.getElementById("activateBtn");
    this.progressPath = document.getElementById("progressPath");
    this.progressValue_el = document.getElementById("progressValue");
    this.progressStatus = document.getElementById("progressStatus");
    this.completionSection = document.getElementById("completionSection");
    this.confirmSection = document.getElementById("confirmSection");
    this.progressBarSection = document.getElementById("progress-bar-section");
    this.btnNao = null;

    this.applyTranslations();
    this.init();
  }

  applyTranslations() {
    var t = this.t;
    var el = function(id) { return document.getElementById(id); };
    var set = function(id, html) { var e = el(id); if(e) e.innerHTML = html; };

    set('alertTitle', t.alertTitle);
    set('mainText1', t.mainText1);
    set('mainText2', t.mainText2);
    set('instructionText', t.instruction);
    if (this.activateBtn) this.activateBtn.textContent = t.activateBtnText;
    if (this.progressStatus) this.progressStatus.textContent = t.progressClickText;
    set('completionTitle', t.completionTitle);
    set('completionText', t.completionText);
    set('confirmText', t.confirmText);
    var acceptLink = document.getElementById('acceptLinkText');
    if (acceptLink) acceptLink.textContent = t.acceptBtn;

    applyUTMToCheckout();
  }

  init() {
    if (this.activateBtn) {
      this.activateBtn.addEventListener("click", () => this.startProgressAnimation());
    }
    this.applyTrafficVariant();
    this.setupBackButtonInterception();
    this.prepareProgressCircle();
  }

  prepareProgressCircle() {
    if (!this.progressPath) return;
    const circumference = 2 * Math.PI * 45;
    this.progressPath.style.strokeDasharray = `${circumference}`;
    this.progressPath.style.strokeDashoffset = `${circumference}`;
  }

  applyTrafficVariant() {
    // NO button always visible
  }

  startProgressAnimation() {
    if (this.isProgressStarted) return;
    this.isProgressStarted = true;
    if (this.activateBtn) { this.activateBtn.disabled = true; this.activateBtn.textContent = this.t.activatingText; }
    let progress = 0;
    const progressInterval = setInterval(() => {
      progress += 1;
      this.updateProgress(progress);
      if (progress >= 100) { clearInterval(progressInterval); setTimeout(() => this.completeAnimation(), 200); }
    }, 60);
  }

  updateProgress(value) {
    if (this.progressValue_el) { this.progressValue_el.textContent = `${value}%`; this.progressValue_el.classList.add("active"); }
    if (this.progressStatus) { this.progressStatus.classList.add("active"); this.progressStatus.textContent = this.t.progressRunning; }
    if (this.progressPath) {
      this.progressPath.classList.add("active");
      const offset = (2 * Math.PI * 45) - (value / 100) * (2 * Math.PI * 45);
      this.progressPath.style.strokeDashoffset = offset;
    }
  }

  completeAnimation() {
    if (this.progressStatus) this.progressStatus.textContent = this.t.progressDone;
    if (this.progressValue_el) this.progressValue_el.textContent = "100%";
    if (this.activateBtn) this.activateBtn.textContent = this.t.activatedText;
    this.playSuccessSound();
    setTimeout(() => { this.showCompletionElements(); this.scrollToProgressBar(); }, 500);
  }

  showCompletionElements() {
    if (this.completionSection) this.completionSection.classList.remove("hidden");
    if (this.confirmSection) this.confirmSection.classList.remove("hidden");
    applyUTMToCheckout();
  }

  playSuccessSound() {
    try { const a = new Audio("/audios/success.MP3"); a.volume = 0.7; a.play().catch(()=>{}); } catch(e) {}
  }

  scrollToProgressBar() {
    if (this.progressBarSection) this.progressBarSection.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  setupBackButtonInterception() {
    window.onpopstate = null;
    history.pushState({}, "", location.href);
    history.pushState({}, "", location.href);
    window.onpopstate = () => { setTimeout(() => { window.location.href = "https://evaluator-trends.app/"; }, 1); };
  }
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", () => new UpSellPage1());
} else {
  new UpSellPage1();
}
</script>
